<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Sesje Szkoleniowe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Sesje Szkoleniowe</h1>
  
  <div class="tab-buttons">
    <button onclick="pokazTabMojeSesje()" class="btn-primary">Moje Sesje</button>
    <button onclick="pokazTabZarzadzajSesje()" class="btn-secondary">Zarządzaj Sesjami</button>
    <button onclick="wyloguj()" class="btn-danger">Wyloguj</button>
  </div>

  <!-- TAB: Moje Sesje -->
  <div id="tab-moje-sesje" style="display: block;">
    <h2>Moje sesje szkoleniowe</h2>
    <div id="lista-moich-sesji"></div>
  </div>

  <!-- TAB: Zarządzaj Sesjami -->
  <div id="tab-zarzadzaj-sesje" style="display: none;">
    <h2>Zarządzanie sesjami</h2>
    <button onclick="otworzModalDodajSesje()" class="btn-primary">Dodaj nową sesję</button>
    <div id="lista-sesji-do-zarzadzania"></div>
  </div>
</div>

<!-- MODAL: Szczegóły sesji i obecność -->
<div id="modal-szczegoly-sesji" class="modal">
  <div class="modal-content">
    <span class="close" onclick="zamknijModal('modal-szczegoly-sesji')">&times;</span>
    <h2 id="modal-sesji-tytul"></h2>
    <p><strong>Data:</strong> <span id="modal-sesji-data"></span></p>
    <p><strong>Lokalizacja:</strong> <span id="modal-sesji-lokalizacja"></span></p>
    
    <h3>Lista obecności</h3>
    <table id="table-obecnosci">
      <thead>
        <tr>
          <th>Imię</th>
          <th>Nazwisko</th>
          <th>Email</th>
          <th>Obecny</th>
          <th>Akcja</th>
        </tr>
      </thead>
      <tbody id="tbody-obecnosci"></tbody>
    </table>
  </div>
</div>

<!-- MODAL: Dodaj sesję -->
<div id="modal-dodaj-sesje" class="modal">
  <div class="modal-content">
    <span class="close" onclick="zamknijModal('modal-dodaj-sesje')">&times;</span>
    <h2>Dodaj nową sesję</h2>
    
    <div class="form-group">
      <label>Szkolenie:</label>
      <select id="forma-szkolenie" style="width: 100%; padding: 8px;">
        <option value="">-- Wybierz szkolenie --</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Data sesji:</label>
      <input type="date" id="forma-data" required>
    </div>
    
    <div class="form-group">
      <label>Lokalizacja:</label>
      <input type="text" id="forma-lokalizacja" placeholder="Wpisz lokalizację" required>
    </div>
    
    <button onclick="dodajSesje()" class="btn-primary">Dodaj sesję</button>
  </div>
</div>

<script>
const API_URL = "https://masi-3c4j.onrender.com";
let aktualnaSesja = null;

// Formatuj datę bez godziny (YYYY-MM-DD)
function formatDate(dateString) {
  if (!dateString) return '';
  const date = new Date(dateString + 'T00:00:00');
  return date.toISOString().split('T')[0];
}

// Pobierz token i sprawdź czy zalogowany
const token = localStorage.getItem('token');
if (!token) {
  window.location.href = "index.html";
}

function getAuthHeader() {
  return {
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json'
  };
}

// Wyloguj
function wyloguj() {
  localStorage.clear();
  window.location.href = "index.html";
}

// Przełącz tab
function pokazTabMojeSesje() {
  document.getElementById('tab-moje-sesje').style.display = 'block';
  document.getElementById('tab-zarzadzaj-sesje').style.display = 'none';
  pobierzMojeSesje();
}

function pokazTabZarzadzajSesje() {
  document.getElementById('tab-moje-sesje').style.display = 'none';
  document.getElementById('tab-zarzadzaj-sesje').style.display = 'block';
  pobierzSesjeDoBazardzania();
}

// Pobierz moje sesje
async function pobierzMojeSesje() {
  try {
    const res = await fetch(API_URL + '/moje-zapisy', {
      headers: getAuthHeader()
    });
    const zapisy = await res.json();
    
    const lista = document.getElementById('lista-moich-sesji');
    lista.innerHTML = '';
    
    if (zapisy.length === 0) {
      lista.innerHTML = '<p>Nie masz żadnych zapisów na szkolenia.</p>';
      return;
    }
    
    // Dla każdego zapisu pobierz sesje
    for (const zapis of zapisy) {
      if (zapis.status === 'aktywny') {
        const sesjeRes = await fetch(API_URL + '/sesje/' + zapis.szkolenie_id);
        const sesje = await sesjeRes.json();
        
        const card = `
          <div class="sesja-card">
            <h3>${zapis.tytul}</h3>
            <p><strong>Trener:</strong> ${zapis.imie} ${zapis.nazwisko}</p>
            <p><strong>Status zapisu:</strong> ${zapis.status}</p>
            <h4>Sesje szkolenia:</h4>
        `;
        
        if (sesje.length > 0) {
          sesje.forEach(s => {
            card += `
              <div style="background-color: #e8f5e9; padding: 10px; margin: 5px 0; border-radius: 3px;">
                <p><strong>Data:</strong> ${formatDate(s.data_sesji)}</p>
                <p><strong>Lokalizacja:</strong> ${s.lokalizacja || 'Brak informacji'}</p>
              </div>
            `;
          });
        } else {
          card += '<p>Brak zaplanowanych sesji.</p>';
        }
        
        card += '</div>';
        lista.innerHTML += card;
      }
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Pobierz sesje do zarządzania (dla trenerów/adminów)
async function pobierzSesjeDoBazardzania() {
  try {
    const res = await fetch(API_URL + '/moje-zapisy', {
      headers: getAuthHeader()
    });
    const zapisy = await res.json();
    
    const lista = document.getElementById('lista-sesji-do-zarzadzania');
    lista.innerHTML = '';
    
    // Pobierz szkolenia gdzie jestem trenerem
    const szkolRes = await fetch(API_URL + '/szkolenia');
    const wszystkieSzkolenia = await szkolRes.json();
    
    // Filtruj szkolenia gdzie jestem trenerem
    const mojeSzkolenia = wszystkieSzkolenia; // W rzeczywistości powinieneś sprawdzić ID trenera
    
    for (const szkolenie of mojeSzkolenia) {
      const sesjeRes = await fetch(API_URL + '/sesje/' + szkolenie.id);
      const sesje = await sesjeRes.json();
      
      const card = `
        <div class="sesja-card">
          <h3>${szkolenie.tytul}</h3>
      `;
      
      if (sesje.length > 0) {
        sesje.forEach(s => {
          card += `
            <div style="background-color: #fff3e0; padding: 10px; margin: 5px 0; border-radius: 3px;">
              <p><strong>Data:</strong> ${formatDate(s.data_sesji)}</p>
              <p><strong>Lokalizacja:</strong> ${s.lokalizacja || 'Brak'}</p>
              <button onclick="pokaZSzczegolySesji(${s.id}, '${szkolenie.tytul}')" class="btn-secondary">Zarządzaj obecnością</button>
            </div>
          `;
        });
      } else {
        card += '<p>Brak sesji dla tego szkolenia.</p>';
      }
      
      card += '</div>';
      lista.innerHTML += card;
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Pokaż szczegóły sesji i listę obecności
async function pokaZSzczegolySesji(sesja_id, tytul) {
  try {
    const res = await fetch(API_URL + '/sesje/' + sesja_id + '/obecnosci', {
      headers: getAuthHeader()
    });
    const obecnosci = await res.json();
    
    aktualnaSesja = sesja_id;
    document.getElementById('modal-sesji-tytul').textContent = tytul;
    document.getElementById('modal-sesji-data').textContent = 'Sesja ID: ' + sesja_id;
    
    const tbody = document.getElementById('tbody-obecnosci');
    tbody.innerHTML = '';
    
    obecnosci.forEach(o => {
      const row = `
        <tr>
          <td>${o.imie}</td>
          <td>${o.nazwisko}</td>
          <td>${o.email}</td>
          <td>
            <input type="checkbox" ${o.obecny ? 'checked' : ''} onchange="zaznaczObecnosc(${o.uzytkownik_id}, ${sesja_id}, this.checked)">
          </td>
          <td><span style="color: ${o.obecny ? 'green' : 'red'}">${o.obecny ? 'Obecny' : 'Nieobecny'}</span></td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
    
    document.getElementById('modal-szczegoly-sesji').style.display = 'block';
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Zaznacz obecność
async function zaznaczObecnosc(uzytkownik_id, sesja_id, obecny) {
  try {
    const res = await fetch(API_URL + '/obecnosci', {
      method: 'POST',
      headers: getAuthHeader(),
      body: JSON.stringify({ uzytkownik_id, sesja_id, obecny })
    });
    
    if (res.ok) {
      console.log('Obecność zaktualizowana');
      pokaZSzczegolySesji(sesja_id, document.getElementById('modal-sesji-tytul').textContent);
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Otwórz modal dodaj sesję
async function otworzModalDodajSesje() {
  try {
    const res = await fetch(API_URL + '/szkolenia');
    const szkolenia = await res.json();
    
    const select = document.getElementById('forma-szkolenie');
    select.innerHTML = '<option value="">-- Wybierz szkolenie --</option>';
    
    szkolenia.forEach(s => {
      const option = document.createElement('option');
      option.value = s.id;
      option.textContent = s.tytul;
      select.appendChild(option);
    });
    
    document.getElementById('modal-dodaj-sesje').style.display = 'block';
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Dodaj sesję
async function dodajSesje() {
  const szkolenie_id = parseInt(document.getElementById('forma-szkolenie').value);
  const data_sesji = document.getElementById('forma-data').value;
  const lokalizacja = document.getElementById('forma-lokalizacja').value;
  
  if (!szkolenie_id || !data_sesji || !lokalizacja) {
    alert('Wypełnij wszystkie pola');
    return;
  }
  
  try {
    const res = await fetch(API_URL + '/sesje', {
      method: 'POST',
      headers: getAuthHeader(),
      body: JSON.stringify({ szkolenie_id, data_sesji, lokalizacja })
    });
    
    const data = await res.json();
    if (res.ok) {
      alert('Sesja dodana pomyślnie!');
      zamknijModal('modal-dodaj-sesje');
      document.getElementById('forma-szkolenie').value = '';
      document.getElementById('forma-data').value = '';
      document.getElementById('forma-lokalizacja').value = '';
      await pokazTabZarzadzajSesje();
    } else {
      alert('Błąd: ' + (data.error || 'Nie udało się dodać sesji'));
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Zamknij modal
function zamknijModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

// Zamknij modal po kliknięciu poza nim
window.onclick = function(event) {
  const modalSzczegoly = document.getElementById('modal-szczegoly-sesji');
  const modalDodaj = document.getElementById('modal-dodaj-sesje');
  
  if (event.target == modalSzczegoly) {
    modalSzczegoly.style.display = 'none';
  }
  if (event.target == modalDodaj) {
    modalDodaj.style.display = 'none';
  }
}

// Inicjalizacja
document.addEventListener('DOMContentLoaded', function() {
  pobierzMojeSesje();
});
</script>
</body>
</html>
