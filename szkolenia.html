<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Szkolenia - System Zarządzania Szkoleniami</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .btn-primary { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    .btn-primary:hover { background-color: #45a049; }
    .btn-secondary { background-color: #2196F3; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; margin-left: 5px; }
    .btn-secondary:hover { background-color: #0b7dda; }
    .btn-danger { background-color: #f44336; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; margin-left: 5px; }
    .btn-danger:hover { background-color: #da190b; }
    .szkolenie-card {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
    .szkolenie-card h3 {
      margin-top: 0;
      color: #333;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 5% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
      border-radius: 5px;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover { color: black; }
    .moje-zapisy { background-color: #e3f2fd; padding: 10px; margin: 10px 0; border-left: 4px solid #2196F3; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Szkolenia</h1>
    <div>
      <button onclick="pokazTabMojeZapisy()" class="btn-secondary">Moje Zapisy</button>
      <button onclick="pokazTabSzkolenia()" class="btn-primary">Dostępne Szkolenia</button>
      <button onclick="wyloguj()" class="btn-danger">Wyloguj</button>
    </div>
  </div>

  <!-- TAB: Dostępne Szkolenia -->
  <div id="tab-szkolenia" style="display: block;">
    <h2>Dostępne szkolenia</h2>
    <input type="text" id="szukaj" placeholder="Szukaj szkolenia..." style="padding: 10px; margin: 10px 0; width: 300px;">
    <div id="lista-szkolen"></div>
  </div>

  <!-- TAB: Moje Zapisy -->
  <div id="tab-moje-zapisy" style="display: none;">
    <h2>Moje zapisy na szkolenia</h2>
    <div id="lista-zapis"></div>
  </div>
</div>

<!-- MODAL: Szczegóły szkolenia -->
<div id="modal-szczegoly" class="modal">
  <div class="modal-content">
    <span class="close" onclick="zamknijModal('modal-szczegoly')">&times;</span>
    <h2 id="modal-tytul"></h2>
    <p><strong>Trener:</strong> <span id="modal-trener"></span></p>
    <p><strong>Opis:</strong> <span id="modal-opis"></span></p>
    <p><strong>Cena:</strong> <span id="modal-cena"></span> zł</p>
    <p><strong>Limit miejsc:</strong> <span id="modal-limit"></span></p>
    <p><strong>Data rozpoczęcia:</strong> <span id="modal-data-start"></span></p>
    <p><strong>Data zakończenia:</strong> <span id="modal-data-end"></span></p>
    <p><strong>Status:</strong> <span id="modal-status"></span></p>
    
    <div id="modal-program">
      <h3>Program szkolenia:</h3>
      <ul id="program-lista"></ul>
    </div>
    
    <button id="btn-zapisz" class="btn-primary" onclick="zapisSieNaSzkolenie()">Zapisz się</button>
  </div>
</div>

<script>
const API_URL = "https://masi-3c4j.onrender.com";
let aktualneSzkolenie = null;
let wszystkieSzkolenia = [];

// Pobierz token i sprawdź czy zalogowany
const token = localStorage.getItem('token');
if (!token) {
  window.location.href = "index.html";
}

// Pobierz nagłówek Authorization
function getAuthHeader() {
  return {
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json'
  };
}

// Wyloguj
function wyloguj() {
  localStorage.clear();
  window.location.href = "index.html";
}

// Przełącz tab
function pokazTabSzkolenia() {
  document.getElementById('tab-szkolenia').style.display = 'block';
  document.getElementById('tab-moje-zapisy').style.display = 'none';
  pobierzSzkolenia();
}

function pokazTabMojeZapisy() {
  document.getElementById('tab-szkolenia').style.display = 'none';
  document.getElementById('tab-moje-zapisy').style.display = 'block';
  pobierzMojeZapisy();
}

// Pobierz wszystkie szkolenia
async function pobierzSzkolenia() {
  try {
    const res = await fetch(API_URL + '/szkolenia');
    const dane = await res.json();
    wszystkieSzkolenia = dane;
    wyswietlSzkolenia(dane);
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Wyświetl szkolenia
function wyswietlSzkolenia(szkolenia) {
  const lista = document.getElementById('lista-szkolen');
  lista.innerHTML = '';
  
  szkolenia.forEach(s => {
    const trener = s.imie ? `${s.imie} ${s.nazwisko}` : 'Nie przypisany';
    const card = `
      <div class="szkolenie-card">
        <h3>${s.tytul}</h3>
        <p><strong>Trener:</strong> ${trener}</p>
        <p>${s.opis}</p>
        <p><strong>Cena:</strong> ${s.cena || 'Brak'} zł | <strong>Limit miejsc:</strong> ${s.limit_miejsc || 'Brak'}</p>
        <button class="btn-secondary" onclick="pokazSzczegoly(${s.id})">Szczegóły</button>
      </div>
    `;
    lista.innerHTML += card;
  });
}

// Pokaż szczegóły szkolenia
async function pokazSzczegoly(szkolenie_id) {
  try {
    const res = await fetch(API_URL + '/szkolenia/' + szkolenie_id);
    const szkolenie = await res.json();
    aktualneSzkolenie = szkolenie;
    
    const trener = szkolenie.imie ? `${szkolenie.imie} ${szkolenie.nazwisko}` : 'Nie przypisany';
    document.getElementById('modal-tytul').textContent = szkolenie.tytul;
    document.getElementById('modal-trener').textContent = trener;
    document.getElementById('modal-opis').textContent = szkolenie.opis || 'Brak opisu';
    document.getElementById('modal-cena').textContent = szkolenie.cena || 'Brak';
    document.getElementById('modal-limit').textContent = szkolenie.limit_miejsc || 'Brak';
    document.getElementById('modal-data-start').textContent = szkolenie.data_rozpoczecia || 'Nie ustalona';
    document.getElementById('modal-data-end').textContent = szkolenie.data_zakonczenia || 'Nie ustalona';
    document.getElementById('modal-status').textContent = szkolenie.status || 'Aktywne';
    
    // Wyświetl program
    const programLista = document.getElementById('program-lista');
    programLista.innerHTML = '';
    if (szkolenie.program && szkolenie.program.length > 0) {
      szkolenie.program.forEach(p => {
        programLista.innerHTML += `<li><strong>${p.tytul}:</strong> ${p.opis}</li>`;
      });
    } else {
      programLista.innerHTML = '<li>Brak programu</li>';
    }
    
    document.getElementById('modal-szczegoly').style.display = 'block';
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Zapisz się na szkolenie
async function zapisSieNaSzkolenie() {
  try {
    const res = await fetch(API_URL + '/zapisy', {
      method: 'POST',
      headers: getAuthHeader(),
      body: JSON.stringify({ szkolenie_id: aktualneSzkolenie.id })
    });
    
    const data = await res.json();
    if (res.ok) {
      alert('Pomyślnie zapisano na szkolenie!');
      zamknijModal('modal-szczegoly');
      pokazTabMojeZapisy();
    } else {
      alert('Błąd: ' + data.error);
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Pobierz moje zapisy
async function pobierzMojeZapisy() {
  try {
    const res = await fetch(API_URL + '/moje-zapisy', {
      headers: getAuthHeader()
    });
    const zapisy = await res.json();
    wyswietlMojeZapisy(zapisy);
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Wyświetl moje zapisy
function wyswietlMojeZapisy(zapisy) {
  const lista = document.getElementById('lista-zapis');
  lista.innerHTML = '';
  
  if (zapisy.length === 0) {
    lista.innerHTML = '<p>Nie masz żadnych zapisów.</p>';
    return;
  }
  
  zapisy.forEach(z => {
    const trener = z.imie ? `${z.imie} ${z.nazwisko}` : 'Nie przypisany';
    const statusKlasa = z.status === 'aktywny' ? 'moje-zapisy' : '';
    const card = `
      <div class="szkolenie-card ${statusKlasa}">
        <h3>${z.tytul}</h3>
        <p><strong>Trener:</strong> ${trener}</p>
        <p><strong>Data zapisania:</strong> ${new Date(z.data_zapisu).toLocaleDateString('pl-PL')}</p>
        <p><strong>Status:</strong> <span style="color: ${z.status === 'aktywny' ? 'green' : 'red'}">${z.status}</span></p>
        <p><strong>Data rozpoczęcia:</strong> ${z.data_rozpoczecia || 'Nie ustalona'}</p>
        <p><strong>Data zakończenia:</strong> ${z.data_zakonczenia || 'Nie ustalona'}</p>
        ${z.status === 'aktywny' ? `<button class="btn-danger" onclick="anulujZapis(${z.id})">Anuluj zapis</button>` : ''}
      </div>
    `;
    lista.innerHTML += card;
  });
}

// Anuluj zapis
async function anulujZapis(zapis_id) {
  if (!confirm('Czy na pewno chcesz anulować zapis?')) return;
  
  try {
    const res = await fetch(API_URL + '/zapisy/' + zapis_id + '/anuluj', {
      method: 'POST',
      headers: getAuthHeader()
    });
    
    const data = await res.json();
    if (res.ok) {
      alert('Zapis anulowany');
      pobierzMojeZapisy();
    } else {
      alert('Błąd: ' + data.error);
    }
  } catch (err) {
    alert('Błąd: ' + err);
  }
}

// Szukaj szkolenia
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('szukaj').addEventListener('keyup', function() {
    const szukaj = this.value.toLowerCase();
    const przefiltrowane = wszystkieSzkolenia.filter(s => 
      s.tytul.toLowerCase().includes(szukaj) || 
      s.opis.toLowerCase().includes(szukaj)
    );
    wyswietlSzkolenia(przefiltrowane);
  });
  
  pobierzSzkolenia();
});

// Zamknij modal
function zamknijModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

// Zamknij modal po kliknięciu poza nim
window.onclick = function(event) {
  const modal = document.getElementById('modal-szczegoly');
  if (event.target == modal) {
    modal.style.display = 'none';
  }
}
</script>
</body>
</html>
