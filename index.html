<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Test API - Użytkownicy</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>


<h1>Lista użytkowników</h1>
<button onclick="pobierzUzytkownikow()">Pobierz dane</button>

<table id="tabela">
  <thead>
    <tr>
      <th>ID</th>
      <th>Imię</th>
      <th>Nazwisko</th>
      <th>Email</th>
      <th>Rola</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://masi-3c4j.onrender.com";

async function pobierzUzytkownikow() {
  try {
    const res = await fetch(API_URL+'/uzytkownicy');
    const dane = await res.json();

    const tbody = document.querySelector("#tabela tbody");
    tbody.innerHTML = "";
    const lista = Array.isArray(dane) ? dane : dane.rows || [];
    lista.forEach(u => {
      const row = `
        <tr>
          <td>${u.id}</td>
          <td>${u.imie}</td>
          <td>${u.nazwisko}</td>
          <td>${u.email}</td>
          <td>${u.rola}</td>
        </tr>
      `;
      tbody.innerHTML += row;
    });

  } catch (err) {
    alert("Błąd: " + err);
  }
}
</script>
<br>
<br>
<div id="logowanie">
  <input type="text" id="email" placeholder="login">
  <input type="password" id="password" placeholder="Hasło">
  <button onclick="zaloguj()">Zaloguj</button>
</div>
<br>
<div id="rejestracja">
  <input type="text" id="imie" placeholder="Imię">
  <input type="text" id="nazwisko" placeholder="Nazwisko">
  <input type="text" id="email1" placeholder="login">
  <input type="password" id="password1" placeholder="Hasło">
  <input type="password" id="password2" placeholder="Powtórz hasło">
  <select id="rola">
    <option value="">Ładowanie ról...</option>
</select>

<script>

   fetch(API_URL+'/api/role')
    .then(response => response.json())
    .then(data => {
        const select = document.getElementById('rola');
        select.innerHTML = '<option value="">-- wybierz rolę --</option>';

        data.forEach(rola => {
            const option = document.createElement('option');
            option.value = rola.id;
            option.textContent = rola.nazwa;
            select.appendChild(option);
        });
    })
    .catch(error => {
        console.error('Błąd:', error);
        document.getElementById('roleSelect').innerHTML =
            '<option value="">Błąd ładowania ról</option>';
    });
</script>
  <button onclick="zarejestruj()">Zarejestruj</button>
</div>

<br>
<div id="szkolenie">

  <input type="text" id="opis" placeholder="Opis">
  <select id="trener">

</div>

<script>
